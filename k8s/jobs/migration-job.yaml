apiVersion: batch/v1
kind: Job
metadata:
  name: sms-platform-migrate
  labels:
    app.kubernetes.io/part-of: sms-platform
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sms-platform-migrate
        app.kubernetes.io/part-of: sms-platform
    spec:
      restartPolicy: Never
      serviceAccountName: sms-platform-runtime
      automountServiceAccountToken: false
      containers:
        - name: migrate
          image: ghcr.io/example/sms-platform-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/run-migrations.mjs"]
          envFrom:
            - configMapRef:
                name: sms-platform-backend-config
            - secretRef:
                name: sms-platform-backend-secrets
