apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-platform-backend-config
data:
  NODE_ENV: "production"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-platform-control-plane-config
data:
  NEXT_PUBLIC_APP_ENV: "production"
  NEXT_PUBLIC_BACKEND_SWAGGER_URL: "https://api.example.com/api/v1/docs"
  BACKEND_BASE_URL: "http://sms-platform-api.default.svc.cluster.local/api/v1"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-platform
spec:
  tls:
    - hosts:
        - app.example.com
        - api.example.com
      secretName: sms-platform-production-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-platform-control-plane
                port:
                  number: 80
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-platform-api
                port:
                  number: 80
