apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-platform-backend-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "api/v1"
  POSTGRES_HOST: "postgres-primary.default.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DATABASE: "sms_platform"
  POSTGRES_MAX_POOL: "50"
  POSTGRES_SSL: "true"
  REDIS_HOST: "redis.default.svc.cluster.local"
  REDIS_PORT: "6379"
  KAFKA_CLIENT_ID: "sms-platform-backend"
  KAFKA_BROKERS: "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
  KAFKA_GROUP_ID: "sms-platform-backend"
  KAFKA_SSL: "false"
  HTTP_PROVIDER_TIMEOUT_MS: "10000"
  OUTBOX_BATCH_SIZE: "100"
  PROMETHEUS_DEFAULT_METRICS: "true"
  SMPP_ENQUIRE_LINK_SECONDS: "30"
  SMPP_DEFAULT_WINDOW_SIZE: "16"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-platform-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sms-platform-backend
  template:
    metadata:
      labels:
        app: sms-platform-backend
    spec:
      containers:
        - name: backend
          image: sms-platform-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sms-platform-backend-config
            - secretRef:
                name: sms-platform-backend-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: sms-platform-backend
spec:
  selector:
    app: sms-platform-backend
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sms-platform-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sms-platform-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
