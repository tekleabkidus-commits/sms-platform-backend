apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sms-platform
  labels:
    app.kubernetes.io/part-of: sms-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  tls:
    - hosts:
        - app.example.invalid
        - api.example.invalid
      secretName: sms-platform-tls
  rules:
    - host: app.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-platform-control-plane
                port:
                  number: 80
    - host: api.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sms-platform-api
                port:
                  number: 80
