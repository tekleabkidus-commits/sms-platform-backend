apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-platform-backend-config
  labels:
    app.kubernetes.io/part-of: sms-platform
data:
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "3000"
  API_PREFIX: "api/v1"
  APP_ROLE: "api"
  LOG_LEVEL: "log"
  TRUST_PROXY: "true"
  CORS_ALLOWED_ORIGINS: "https://app.example.invalid"
  SHUTDOWN_TIMEOUT_MS: "15000"
  POSTGRES_HOST: "postgres-primary.data.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DATABASE: "sms_platform"
  POSTGRES_MAX_POOL: "50"
  POSTGRES_SSL: "true"
  REDIS_HOST: "redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  KAFKA_CLIENT_ID: "sms-platform-backend"
  KAFKA_BROKERS: "kafka-0.kafka.kafka.svc.cluster.local:9092,kafka-1.kafka.kafka.svc.cluster.local:9092,kafka-2.kafka.kafka.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "sms-platform-backend"
  KAFKA_SSL: "true"
  HTTP_PROVIDER_TIMEOUT_MS: "10000"
  PROVIDER_UNKNOWN_OUTCOME_TIMEOUT_MS: "15000"
  OUTBOX_BATCH_SIZE: "250"
  OUTBOX_PUBLISH_LEASE_SECONDS: "60"
  ALLOW_INSECURE_PLAIN_SECRETS: "false"
  PROMETHEUS_DEFAULT_METRICS: "true"
  SMPP_ENQUIRE_LINK_SECONDS: "30"
  SMPP_DEFAULT_WINDOW_SIZE: "16"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "3"
  CIRCUIT_BREAKER_OPEN_SECONDS: "60"
  CIRCUIT_BREAKER_HALF_OPEN_PROBE_SECONDS: "15"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sms-platform-control-plane-config
  labels:
    app.kubernetes.io/part-of: sms-platform
data:
  PORT: "3001"
  BACKEND_BASE_URL: "http://sms-platform-api.default.svc.cluster.local/api/v1"
  NEXT_PUBLIC_BACKEND_SWAGGER_URL: "https://api.example.invalid/api/v1/docs"
  NEXT_PUBLIC_APP_ENV: "production"
