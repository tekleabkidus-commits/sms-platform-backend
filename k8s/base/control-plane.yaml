apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-platform-control-plane
  labels:
    app.kubernetes.io/name: sms-platform-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: sms-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sms-platform-control-plane
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/part-of: sms-platform
    spec:
      serviceAccountName: sms-platform-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: control-plane
          image: sms-platform-control-plane
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sms-platform-control-plane-config
            - secretRef:
                name: sms-platform-control-plane-secrets
          ports:
            - name: http
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sms-platform-control-plane
  labels:
    app.kubernetes.io/name: sms-platform-control-plane
    app.kubernetes.io/component: control-plane
    app.kubernetes.io/part-of: sms-platform
spec:
  selector:
    app.kubernetes.io/name: sms-platform-control-plane
  ports:
    - name: http
      port: 80
      targetPort: http
