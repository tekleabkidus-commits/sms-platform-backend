apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sms-platform-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sms-platform-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sms-platform-worker-dispatch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sms-platform-worker-dispatch
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sms-platform-control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sms-platform-control-plane
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sms-platform-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sms-platform-control-plane
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-control-plane
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sms-platform-worker-dispatch
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-worker-dispatch
