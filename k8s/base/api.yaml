apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-platform-api
  labels:
    app.kubernetes.io/name: sms-platform-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sms-platform
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sms-platform-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sms-platform
        metrics: "true"
    spec:
      serviceAccountName: sms-platform-runtime
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sms-platform-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sms-platform-api
      containers:
        - name: api
          image: sms-platform-backend
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ROLE
              value: "api"
          envFrom:
            - configMapRef:
                name: sms-platform-backend-config
            - secretRef:
                name: sms-platform-backend-secrets
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /api/v1/health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sms-platform-api
  labels:
    app.kubernetes.io/name: sms-platform-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sms-platform
    metrics: "true"
spec:
  selector:
    app.kubernetes.io/name: sms-platform-api
  ports:
    - name: http
      port: 80
      targetPort: http
