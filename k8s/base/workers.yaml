apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-platform-worker-dispatch
  labels:
    app.kubernetes.io/name: sms-platform-worker-dispatch
    app.kubernetes.io/component: worker-dispatch
    app.kubernetes.io/part-of: sms-platform
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: sms-platform-worker-dispatch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sms-platform-worker-dispatch
        app.kubernetes.io/component: worker-dispatch
        app.kubernetes.io/part-of: sms-platform
        metrics: "true"
    spec:
      serviceAccountName: sms-platform-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker-dispatch
          image: sms-platform-backend
          env:
            - name: APP_ROLE
              value: worker-dispatch
          envFrom:
            - configMapRef:
                name: sms-platform-backend-config
            - secretRef:
                name: sms-platform-backend-secrets
          ports:
            - name: http
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /api/v1/health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "3"
              memory: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sms-platform-worker-dispatch
  labels:
    app.kubernetes.io/name: sms-platform-worker-dispatch
    metrics: "true"
spec:
  selector:
    app.kubernetes.io/name: sms-platform-worker-dispatch
  ports:
    - name: http
      port: 80
      targetPort: http
---
