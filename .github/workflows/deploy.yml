name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository_owner }}/sms-platform-backend
  CONTROL_PLANE_IMAGE_NAME: ${{ github.repository_owner }}/sms-platform-control-plane

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      control_plane_image: ${{ steps.meta.outputs.control_plane_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
      - name: Build and push control plane
        uses: docker/build-push-action@v6
        with:
          context: ./control-plane
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.CONTROL_PLANE_IMAGE_NAME }}:${{ github.sha }}
      - id: meta
        run: |
          echo "backend_image=${REGISTRY}/${BACKEND_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "control_plane_image=${REGISTRY}/${CONTROL_PLANE_IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
      - name: Render overlay with release images
        run: |
          cp -R k8s/overlays/${{ inputs.environment }} /tmp/overlay
          cd /tmp/overlay
          kustomize edit set image sms-platform-backend=${{ needs.build-and-push.outputs.backend_image }}
          kustomize edit set image sms-platform-control-plane=${{ needs.build-and-push.outputs.control_plane_image }}
          kustomize build . > /tmp/release.yaml
      - name: Run migrations
        run: |
          kubectl delete job sms-platform-migrate --ignore-not-found=true
          sed "s|ghcr.io/example/sms-platform-backend:latest|${{ needs.build-and-push.outputs.backend_image }}|g" k8s/jobs/migration-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/sms-platform-migrate --timeout=10m
      - name: Apply release manifests
        run: kubectl apply -f /tmp/release.yaml
      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/sms-platform-api --timeout=10m
          kubectl rollout status deployment/sms-platform-worker-dispatch --timeout=10m
          kubectl rollout status deployment/sms-platform-worker-dlr --timeout=10m
          kubectl rollout status deployment/sms-platform-worker-outbox --timeout=10m
          kubectl rollout status deployment/sms-platform-control-plane --timeout=10m
      - name: Smoke check deployed endpoints
        run: |
          node scripts/smoke-check.mjs
        env:
          SMOKE_BACKEND_URL: ${{ secrets.SMOKE_BACKEND_URL }}
          SMOKE_FRONTEND_URL: ${{ secrets.SMOKE_FRONTEND_URL }}
